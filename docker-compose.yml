services:
  postgres:
    image: postgres:17-alpine
    container_name: persistence-test-pg
    environment:
      POSTGRES_DB: persistence_test
      POSTGRES_USER: persistence_test
      POSTGRES_PASSWORD: persistence_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persistence_test -d persistence_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
